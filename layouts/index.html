{{ define "main" }}
<div class="home">
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-name">kingdeguo</h1>
      <p class="hero-tagline">生活很复杂，我想让他简单一点</p>
    </div>
  </section>

  <section class="homepage-recent-posts">
    <div class="recent-posts-list">
      {{ range first 10 (where .Site.RegularPages "Type" "posts") }}
      <article class="recent-post-item">
        <time class="recent-post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
        <h3 class="recent-post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      </article>
      {{ end }}
    </div>
    <div class="recent-posts-footer">
      <a href="/posts/" class="btn btn-outline">查看全部文章 →</a>
    </div>
    <div class="homepage-section-separator"></div>
    {{ with .Site.Data.projects_meta }}
    <div class="homepage-mini-section">
      <h4 class="mini-section-title">作品</h4>
      <div class="mini-project-list">
        {{ range first 3 . }}
        <a href="{{ .url | default "#" }}" class="mini-project-item" target="_blank" rel="noopener">{{ .name }}</a>
        {{ end }}
      </div>
      <div class="recent-posts-footer">
        <a href="/projects/" class="btn btn-outline">查看全部作品 →</a>
      </div>
    </div>
    {{ end }}
  </section>
</div>
{{ end }}
