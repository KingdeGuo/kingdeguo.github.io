{{ define "main" }}
<article class="post project-detail">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <div class="post-meta-primary">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006年1月2日" }}</time>
        <span class="post-reading-time">
          <a href="{{ .Params.github }}" target="_blank" rel="noopener" class="project-github-link">GitHub 仓库 →</a>
        </span>
      </div>
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
