name: Build and Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Restore previous translations
        uses: actions/cache@v4
        with:
          path: |
            content/en
            scripts/.translation_cache.json
          key: en-translations-${{ hashFiles('content/zh/posts/**') }}
          restore-keys: |
            en-translations-

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.151.0'
          extended: true

      - name: Fetch GitHub repo info for projects
        run: python3 scripts/fetch_projects.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Translate posts to English
        run: python3 scripts/translate_posts.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_TRANSLATIONS: ${{ vars.MAX_TRANSLATIONS }}

      - name: Commit translations back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git add content/en/ scripts/.translation_cache.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-translate posts to English [skip ci]"
            git push
          else
            echo "No new translations to commit."
          fi

      - name: Build with Hugo
        run: hugo --minify --environment production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public