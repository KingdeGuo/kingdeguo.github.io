name: Build and Deploy Hugo Site

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore previous translations
        uses: actions/cache@v4
        with:
          path: |
            content/en
            scripts/.translation_cache.json
          key: en-translations-${{ hashFiles('content/zh/posts/**') }}
          restore-keys: |
            en-translations-

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.151.0'

      - name: Translate posts to English
        run: python3 scripts/translate_posts.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_TRANSLATIONS: 1

      - name: Build site with Hugo
        run: |
          hugo --minify

      - name: Upload public/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
